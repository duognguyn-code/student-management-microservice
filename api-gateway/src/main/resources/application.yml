server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1

        - id: student-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/students/**
          filters:
            - StripPrefix=1

        - id: course-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/courses/**
          filters:
            - StripPrefix=1